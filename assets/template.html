<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeestarAI 报道</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e8e4de; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 54px 27px; }
  .canvas { display: flex; gap: 27px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }

  .card {
    width: 540px; height: 720px; border-radius: 24px; padding: 36px 42px 36px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    display: flex; flex-direction: column; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .card-light { background: #faf8f5; color: #1c1c1e; }
  .card-dark  { background: #1c1c1e; color: #e8e4de; }
  .accent      { color: #c44a2a; }
  .card-dark .accent { color: #d4744a; }
  .sec         { color: #8c8880; }
  .card-dark .sec { color: #7a7670; }

  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 21px; }
  .brand { font-size: 18px; font-weight: 800; letter-spacing: 3px; }
  .card-light .brand { color: #1c1c1e; }
  .card-dark  .brand { color: #e8e4de; }
  .section-tag { font-size: 12px; letter-spacing: 3px; text-align: right; }
  .card-light .section-tag { color: #b8b4ac; }
  .card-dark  .section-tag { color: #5a5650; }
  h2 { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 18px; letter-spacing: -0.3px; }

  /* 封面 */
  .cover-badge { display: inline-block; padding: 5px 16px; border-radius: 20px; font-size: 13px; letter-spacing: 2px; margin-bottom: 24px; }
  .card-dark .cover-badge { background: rgba(255,255,255,0.06); color: #7a7670; }
  .cover h1 { font-size: 40px; font-weight: 800; line-height: 1.14; letter-spacing: -0.5px; margin-bottom: 14px; }
  .lead { font-size: 17px; line-height: 1.55; margin-bottom: 28px; }
  .hero-stat .hs-val { font-size: 66px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
  .hs-cap { font-size: 15px; margin-top: 4px; }
  .cover-footer { font-size: 14px; line-height: 1.5; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: auto; }

  /* 指标行 */
  .metric-stack { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .metric-row { display: flex; align-items: flex-start; gap: 18px; border-radius: 12px; padding: 16px 20px; }
  .card-dark .metric-row { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .card-light .metric-row { background: #fff; border: 1px solid #eee; }
  .metric-row .mv { font-size: 30px; font-weight: 800; min-width: 100px; line-height: 1; flex-shrink: 0; }
  .metric-row .md { font-size: 15px; line-height: 1.5; }

  /* 底部注释 */
  .footnote { font-size: 15px; line-height: 1.5; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.06); margin-top: auto; }
  .card-dark .footnote { border-top-color: rgba(255,255,255,0.06); }

  /* 2x2 网格 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gc { border-radius: 12px; padding: 18px; }
  .card-dark .gc { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .card-light .gc { background: #fff; border: 1px solid #eee; }
  .gc .gv { font-size: 26px; font-weight: 800; margin-bottom: 4px; line-height: 1; }
  .gc .gl { font-size: 14px; }
  .card-light .gl { color: #8c8880; }
  .card-dark  .gl { color: #8a8680; }

  /* 机构 2x2 */
  .fund-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; }
  .fund-card { border-radius: 12px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .card-light .fund-card { background: #fff; border: 1px solid #eee; }
  .card-dark  .fund-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .fund-card .fname { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .fund-card .frole { font-size: 13px; }
  .card-light .frole { color: #8c8880; }
  .card-dark  .frole { color: #7a7670; }

  /* 柱状图 */
  .bar-list { display: flex; flex-direction: column; gap: 11px; flex: 1; }
  .bar-item { display: flex; align-items: center; gap: 12px; }
  .bar-item .bn { font-size: 14px; font-weight: 600; min-width: 88px; text-align: right; flex-shrink: 0; }
  .bar-item .bt { flex: 1; height: 26px; border-radius: 5px; overflow: hidden; }
  .card-light .bt { background: #edebe5; }
  .card-dark  .bt { background: #2a2a2a; }
  .bar-item .bfill { height: 100%; border-radius: 5px; }
  .bar-item .bv { font-size: 14px; font-weight: 600; min-width: 95px; flex-shrink: 0; }

  /* 双栏辩论 */
  .debate-cols { display: flex; gap: 14px; flex: 1; }
  .debate-col { flex: 1; border-radius: 12px; padding: 18px; display: flex; flex-direction: column; }
  .debate-col.bear { background: #f0ede7; border: 1px solid #e0dbd3; }
  .debate-col.bull { background: #1c1c1e; border: 1px solid #333; }
  .debate-col .dh { font-size: 13px; letter-spacing: 3px; font-weight: 700; margin-bottom: 10px; }
  .debate-col.bear .dh { color: #a09888; }
  .debate-col.bull .dh { color: #d4744a; }
  .debate-col .di { font-size: 13px; line-height: 1.5; margin-bottom: 6px; padding-left: 8px; position: relative; }
  .debate-col.bear .di { color: #8a8478; }
  .debate-col.bull .di { color: #b0aca4; }
  .debate-col .di::before { content: '·'; position: absolute; left: 0; top: 0; font-weight: 700; }
  .debate-col.bear .di::before { color: #c0b8a8; }
  .debate-col.bull .di::before { color: #d4744a; }

  /* 增长剖面 */
  .gro-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gro-card { border-radius: 12px; padding: 18px; display: flex; flex-direction: column; }
  .card-light .gro-card { background: #fff; border: 1px solid #eee; }
  .card-dark  .gro-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .gro-card .gv { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .gro-card .gwhen { font-size: 13px; margin-bottom: 3px; }
  .gro-card .gwhat { font-size: 14px; }
  .card-light .gwhen { color: #8c8880; }
  .card-dark  .gwhen { color: #8a8680; }
  .card-light .gwhat { color: #6a6660; }
  .card-dark  .gwhat { color: #9a9690; }

  /* 引语 */
  .quote-stack { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .quote-block { border-left: 3px solid #c44a2a; padding: 12px 16px; font-size: 15px; line-height: 1.5; }
  .card-light .quote-block { color: #5a5650; background: #f5f2ed; }
  .card-dark  .quote-block { color: #b0aca6; background: rgba(255,255,255,0.03); border-left-color: #d4744a; }
  .quote-block .qa { font-size: 13px; margin-top: 4px; font-weight: 600; }
  .card-light .qa { color: #1c1c1e; }
  .card-dark  .qa { color: #e8e4de; }

  /* 时间线 */
  .tl { position: relative; padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.08); flex: 1; }
  .tl-i { margin-bottom: 16px; position: relative; }
  .tl-i::before { content: ''; position: absolute; left: -22px; top: 5px; width: 8px; height: 8px; border-radius: 50%; background: #d4744a; }
  .tl-d { font-size: 13px; letter-spacing: 2px; margin-bottom: 2px; }
  .card-dark .tl-d { color: #5a5650; }
  .tl-t { font-size: 15px; line-height: 1.45; }
  .card-dark .tl-t { color: #a0a098; }

  /* 来源 */
  .src-stack { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .src-item { border-radius: 12px; padding: 15px 18px; }
  .card-light .src-item { background: #fff; border: 1px solid #eee; }
  .card-dark  .src-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .src-item .st { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .src-item .sd { font-size: 13px; line-height: 1.45; }
  .card-light .sd { color: #6a6660; }
  .card-dark  .sd { color: #9a9690; }

  /* 大数字卡 */
  .big-num { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
  .big-num .bn-val { font-size: 72px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
  .big-num .bn-label { font-size: 17px; margin-top: 12px; line-height: 1.5; max-width: 360px; }

  /* 三段式叙事 */
  .narr-stack { display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .narr-block { border-radius: 12px; padding: 18px 20px; }
  .card-dark  .narr-block { background: rgba(255,255,255,0.04); }
  .card-light .narr-block { background: #fff; border: 1px solid #eee; }
  .narr-block .nh { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .narr-block .nb { font-size: 14px; line-height: 1.55; }

  /* 对比双列 */
  .compare-cols { display: flex; gap: 14px; flex: 1; }
  .compare-col { flex: 1; border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 8px; }
  .card-light .compare-col { background: #fff; border: 1px solid #eee; }
  .card-dark  .compare-col { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); }
  .compare-col .ch { font-size: 14px; font-weight: 700; }
  .compare-col .ci { font-size: 13px; line-height: 1.5; }

</style>
</head>
<body>
<div class="canvas">
</div>
</body>
</html>
